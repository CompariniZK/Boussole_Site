<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion Admin — Boussole</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>" />
  <style>
    :root {
      --primary: #1a237e; --primary-mid: #283593; --primary-light: #3949ab;
      --accent: #f5a623; --bg: #f0f2f8; --white: #ffffff;
      --text: #1a1a2e; --text-sec: #6b7280; --border: #e5e7eb;
      --red: #ef4444; --green: #10b981;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, #1565c0 100%);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
      position: relative; overflow: hidden;
    }
    body::before {
      content: ''; position: absolute; top: -20%; right: -10%;
      width: 500px; height: 500px; border-radius: 50%;
      background: rgba(255,255,255,0.04); pointer-events: none;
    }
    body::after {
      content: ''; position: absolute; bottom: -15%; left: -5%;
      width: 400px; height: 400px; border-radius: 50%;
      background: rgba(245,166,35,0.06); pointer-events: none;
    }
    .card {
      background: var(--white); border-radius: 20px;
      padding: 44px 40px; width: 100%; max-width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
      position: relative; z-index: 1;
      animation: slideUp .4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px; justify-content: center;
    }
    .logo-icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; box-shadow: 0 4px 16px rgba(26,35,126,0.25);
    }
    .logo-text { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(26,35,126,0.08); color: var(--primary-light);
      padding: 4px 12px; border-radius: 20px; font-size: 11px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 28px;
    }
    h1 { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--text-sec); margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 15px; pointer-events: none;
    }
    input {
      width: 100%; padding: 11px 14px 11px 38px;
      border-radius: 10px; border: 1.5px solid var(--border);
      font-size: 14px; color: var(--text); background: var(--bg);
      transition: border-color .2s, box-shadow .2s; outline: none;
      font-family: inherit;
    }
    input:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(57,73,171,0.1); }
    input.error { border-color: var(--red); }
    .toggle-pass {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 16px;
      color: var(--text-sec); padding: 2px;
    }
    .error-box {
      display: none; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
      color: var(--red); border-radius: 10px; padding: 10px 14px;
      font-size: 13px; font-weight: 600; margin-bottom: 16px;
      align-items: center; gap: 8px;
    }
    .error-box.show { display: flex; animation: shake .4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    .btn {
      width: 100%; padding: 13px; background: var(--primary);
      color: white; font-size: 15px; font-weight: 800;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background .2s, transform .1s, box-shadow .2s;
      margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { background: var(--primary-light); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,35,126,0.25); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { background: var(--border); cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
    .btn.loading .btn-text { display: none; }
    .btn.loading .btn-spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer-note {
      text-align: center; margin-top: 24px;
      font-size: 12px; color: var(--text-sec);
    }
    .footer-note a { color: var(--primary-light); text-decoration: none; font-weight: 600; }
    .footer-note a:hover { text-decoration: underline; }
    .attempts-note {
      text-align: center; font-size: 11px; color: var(--text-sec);
      margin-top: 12px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🧭</div>
    <span class="logo-text">Boussole</span>
  </div>

  <div style="text-align:center; margin-bottom:28px;">
    <div class="badge">🔐 Espace administration</div>
    <h1>Connexion</h1>
    <p class="subtitle">Accès réservé aux administrateurs autorisés</p>
  </div>

  <div class="error-box" id="errorBox">
    <span>⚠️</span>
    <span id="errorMsg">Email ou mot de passe incorrect.</span>
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="email">Adresse email</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" placeholder="admin@boussole.app" autocomplete="email" required />
      </div>
    </div>
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password" required />
        <button type="button" class="toggle-pass" onclick="togglePassword()" id="toggleBtn">👁️</button>
      </div>
    </div>

    <button type="submit" class="btn" id="loginBtn">
      <span class="btn-text">Se connecter →</span>
      <div class="btn-spinner"></div>
    </button>
  </form>

  <div class="attempts-note" id="attemptsNote"></div>

  <div class="footer-note">
    <a href="../index.html">← Retour au site Boussole</a>
  </div>
</div>

<script>
  // ── USERS ────────────────────────────────────────────────────────────────────
  // Mots de passe stockés en SHA-256 (calculés côté client)
  // Pour ajouter un utilisateur : récupérer le hash via sha256(password)
  // Credentials par défaut :
  //   admin@boussole.app     →  Boussole2026!
  //   mairie@lrsy.fr         →  Mairie2026!
  const USERS = {
    'admin@boussole.app':  '927db0981f1b28cdcd96589ced8d0218f73e88a0a858f83b7abd7f1583973b9c',
    'mairie@lrsy.fr':      '1abe2129cbc50fb9e93751c7bd94fc2fce11cb8f5d5d3fa45a5777d3a9dc99ec',
  };

  // Sessions max avant blocage temporaire
  let attempts = 0;
  const MAX_ATTEMPTS = 5;
  let blocked = false;
  let blockTimer = null;

  // ── SHA-256 ──────────────────────────────────────────────────────────────────
  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // ── INIT : recalcule les hashes au premier chargement ─────────────────────────
  // (Permet que les hashes soient toujours corrects, même si modifiés)
  async function initHashes() {
    // Les hashes stockés dans USERS sont recalculés dynamiquement
    // pour garantir la cohérence. L'administrateur met à jour les
    // mots de passe via la page admin/setup.html
    const stored = localStorage.getItem('boussole_admin_users');
    if (stored) {
      const parsed = JSON.parse(stored);
      Object.assign(USERS, parsed);
    }
  }

  // ── LOGIN ────────────────────────────────────────────────────────────────────
  async function handleLogin(e) {
    e.preventDefault();
    if (blocked) return;

    const btn = document.getElementById('loginBtn');
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    btn.classList.add('loading');
    btn.disabled = true;

    // Simulation délai réseau + hash
    await new Promise(r => setTimeout(r, 600));
    const hash = await sha256(password);

    if (USERS[email] && USERS[email] === hash) {
      // ✅ Succès
      attempts = 0;
      sessionStorage.setItem('boussole_auth', btoa(email + ':' + Date.now()));
      sessionStorage.setItem('boussole_user', email);
      sessionStorage.setItem('boussole_role', email === 'admin@boussole.app' ? 'admin' : 'viewer');

      btn.classList.remove('loading');
      btn.style.background = '#10b981';
      btn.querySelector('.btn-text').style.display = 'flex';
      btn.querySelector('.btn-text').textContent = '✓ Connexion réussie...';

      setTimeout(() => { window.location.href = 'index.html'; }, 700);
    } else {
      // ❌ Échec
      attempts++;
      btn.classList.remove('loading');
      btn.disabled = false;

      document.getElementById('email').classList.add('error');
      document.getElementById('password').classList.add('error');

      const remaining = MAX_ATTEMPTS - attempts;
      let msg = 'Email ou mot de passe incorrect.';
      if (remaining <= 2 && remaining > 0) {
        msg += ` Plus que ${remaining} tentative${remaining > 1 ? 's' : ''} avant blocage.`;
      }
      showError(msg);

      if (attempts >= MAX_ATTEMPTS) {
        blocked = true;
        const blockDuration = 30;
        btn.disabled = true;
        let countdown = blockDuration;

        const interval = setInterval(() => {
          countdown--;
          document.getElementById('attemptsNote').textContent = `⏳ Trop de tentatives. Réessayez dans ${countdown}s`;
          if (countdown <= 0) {
            clearInterval(interval);
            blocked = false;
            attempts = 0;
            btn.disabled = false;
            document.getElementById('attemptsNote').textContent = '';
          }
        }, 1000);
      }

      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    document.getElementById('errorMsg').textContent = msg;
    box.classList.remove('show');
    void box.offsetWidth; // force reflow
    box.classList.add('show');
  }

  function togglePassword() {
    const input = document.getElementById('password');
    const btn = document.getElementById('toggleBtn');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁️';
    }
  }

  // Limpar bordas vermelhas ao digitar
  ['email','password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById(id).classList.remove('error');
      document.getElementById('errorBox').classList.remove('show');
    });
  });

  // Se já autenticado, redireciona diretamente
  if (sessionStorage.getItem('boussole_auth')) {
    window.location.href = 'index.html';
  }

  initHashes();
</script>

</body>
</html>
